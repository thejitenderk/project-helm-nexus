# ─────────────────────────────────────────────────────────────
# Docker Voting App - Helm Values
# ─────────────────────────────────────────────────────────────

# ─── UI Applications ─────────────────────────────────────────
uis:
  - name: vote-ui
    image:
      repository: docker.io/dockersamples/examplevotingapp_vote
      tag: "latest"
      pullPolicy: IfNotPresent
    replicaCount: 1
    containerPort: 80
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    env:
      OPTION_A: "Cats"
      OPTION_B: "Dogs"
    envFromConfigMap: ""
    envFromSecret: ""

