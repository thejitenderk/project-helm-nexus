name: Helm Chart CI/CD → Nexus (OCI)

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
  workflow_dispatch:

env:
  NEXUS_URL: 20.235.80.53:8082   # ⚠️ docker repo port
  NEXUS_REPO: helm-oci
  CHART_DIR: charts

jobs:
  helm-push:
    name: Package & Push Helm Chart (OCI)
    runs-on: self-hosted

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Helm
      - name: Setup Helm
        uses: azure/setup-helm@v4

      # 3. Version bump
      - name: Bump chart version
        id: chart_info
        run: |
          CHART_NAME=$(grep '^name:' ${{ env.CHART_DIR }}/Chart.yaml | awk '{print $2}')
          CURRENT_VERSION=$(grep '^version:' ${{ env.CHART_DIR }}/Chart.yaml | awk '{print $2}')

          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s/^version: .*/version: $NEW_VERSION/" charts/Chart.yaml
          else
            sed -i "s/^version: .*/version: $NEW_VERSION/" charts/Chart.yaml
          fi

          echo "chart_name=$CHART_NAME" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # 4. Commit version bump
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.CHART_DIR }}/Chart.yaml
          git commit -m "ci: bump chart version to ${{ steps.chart_info.outputs.new_version }} [skip ci]"
          git push

      # 5. Helm lint
      - name: Lint Helm chart
        run: helm lint ${{ env.CHART_DIR }}

      # 6. Package chart
      - name: Package Helm chart
        run: |
          mkdir -p packaged
          helm package ${{ env.CHART_DIR }} --destination packaged/

      # 🔥 7. OCI Login (IMPORTANT)
      - name: Login to Nexus OCI registry
        run: |
          helm registry login ${{ env.NEXUS_URL }} \
            -u ${{ secrets.NEXUS_USERNAME }} \
            -p ${{ secrets.NEXUS_PASSWORD }}

      # 🔥 8. Push using OCI (MAIN CHANGE)
      - name: Push chart to OCI Nexus
        run: |
          CHART_FILE=$(ls packaged/*.tgz)
          
          echo "🚀 Pushing to OCI registry..."
          
          helm push $CHART_FILE oci://${{ env.NEXUS_URL }}/${{ env.NEXUS_REPO }}

      # 9. Summary
      - name: Job Summary
        run: |
          echo "## 🎉 Helm Chart Pushed (OCI)!" >> $GITHUB_STEP_SUMMARY
          echo "| Chart | ${{ steps.chart_info.outputs.chart_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.chart_info.outputs.new_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Repo | oci://${{ env.NEXUS_URL }}/${{ env.NEXUS_REPO }} |" >> $GITHUB_STEP_SUMMARY
