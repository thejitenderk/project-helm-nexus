name: Helm Chart CI/CD → Nexus

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
  workflow_dispatch:

env:
  NEXUS_URL: http://localhost:8081
  NEXUS_REPO: helm-hosted
  CHART_DIR: charts

jobs:
  helm-push:
    name: Package & Push Helm Chart
    runs-on: self-hosted

    # ─── Repo mein write permission chahiye version bump ke liye ───────
    permissions:
      contents: write

    steps:
      # ─── 1. Code checkout ───────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}  # write ke liye

      # ─── 2. Helm install ────────────────────────────────────────────
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      # ─── 3. Auto version bump ───────────────────────────────────────
      # Current version padho → patch increment karo → Chart.yaml update karo
      - name: Bump chart version
        id: chart_info
        run: |
          CHART_NAME=$(grep '^name:' ${{ env.CHART_DIR }}/Chart.yaml | awk '{print $2}')
          CURRENT_VERSION=$(grep '^version:' ${{ env.CHART_DIR }}/Chart.yaml | awk '{print $2}')

          # Semver split karo → 0.1.4 → MAJOR=0, MINOR=1, PATCH=4
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

          # Patch +1 karo
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          echo "📦 Chart: $CHART_NAME"
          echo "🔢 Version: $CURRENT_VERSION → $NEW_VERSION"

          # Chart.yaml mein version update karo
          sed -i "s/^version: .*/version: $NEW_VERSION/" ${{ env.CHART_DIR }}/Chart.yaml

          # Output set karo
          echo "chart_name=$CHART_NAME" >> $GITHUB_OUTPUT
          echo "old_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      # ─── 4. Bumped version commit karke push karo ───────────────────
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.CHART_DIR }}/Chart.yaml
          git commit -m "ci: bump chart version to ${{ steps.chart_info.outputs.new_version }} [skip ci]"
          git push
        # [skip ci] → infinite loop avoid karne ke liye
        # yeh commit dobara workflow trigger nahi karega

      # ─── 5. Helm lint ───────────────────────────────────────────────
      - name: Lint Helm chart
        run: |
          helm lint ${{ env.CHART_DIR }}

      # ─── 6. Helm package ────────────────────────────────────────────
      - name: Package Helm chart
        run: |
          mkdir -p packaged
          helm package ${{ env.CHART_DIR }} --destination packaged/
          echo "✅ Packaged: $(ls packaged/)"

      # ─── 7. Push to Nexus ───────────────────────────────────────────
      - name: Push chart to Nexus
        env:
          NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          CHART_FILE=$(ls packaged/*.tgz)
          FILENAME=$(basename $CHART_FILE)

          echo "🚀 Pushing $FILENAME to Nexus..."

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "$NEXUS_USER:$NEXUS_PASS" \
            --upload-file "$CHART_FILE" \
            "${{ env.NEXUS_URL }}/repository/${{ env.NEXUS_REPO }}/$FILENAME")

          echo "HTTP Status: $HTTP_STATUS"

          if [[ "$HTTP_STATUS" == "200" || "$HTTP_STATUS" == "201" ]]; then
            echo "✅ Chart pushed successfully!"
          else
            echo "❌ Push failed with HTTP $HTTP_STATUS"
            exit 1
          fi

      # ─── 8. Summary ─────────────────────────────────────────────────
      - name: Job Summary
        run: |
          echo "## 🎉 Helm Chart Pushed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Chart | \`${{ steps.chart_info.outputs.chart_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Old Version | \`${{ steps.chart_info.outputs.old_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New Version | \`${{ steps.chart_info.outputs.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Nexus Repo | \`${{ env.NEXUS_REPO }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ env.NEXUS_URL }}/repository/${{ env.NEXUS_REPO }}/ |" >> $GITHUB_STEP_SUMMARY