{{- range $key, $svc := .Values.microservices }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.name }}
  labels:
    app: {{ $svc.name }}
    chart: {{ $.Chart.Name }}-{{ $.Chart.Version }}
    release: {{ $.Release.Name }}
    harness.io/release-name: {{ $.Release.Name }}
    heritage: {{ $.Release.Service }}
spec:
  type: {{ $svc.service.type }}
  ports:
    - port: {{ $svc.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ $svc.name }}
    release: {{ $.Release.Name }}
---
{{- end }}